version: 2

models:
  - name: loan_applications
    description: "Accepted ve rejected loan başvurularının birleştirilmiş mart tablosu"

    columns:
      - name: loan_amount
        tests:
          - not_null

      - name: loan_term
        description: "Loan süresi (ay). Sadece accepted."

      - name: interest_rate
        description: "Faiz oranı. Rejected için null olabilir."
        tests:
          - dbt_utils.expression_is_true:
              expression: "interest_rate >= 0 or interest_rate is null"

      - name: grade

      - name: sub_grade

      - name: employment_length_years
        tests:
          - dbt_utils.expression_is_true:
              expression: "employment_length_years >= 0 and employment_length_years <= 10 or employment_length_years is null"

      - name: employment_length_bucket

      - name: annual_income

      - name: purpose

      - name: state
        description: "Eyalet bilgisi. Rejected başvurularda null olabilir."

      - name: dti
        tests:
          - dbt_utils.expression_is_true:
              expression: "dti >= 0 and dti <= 1 or dti is null"

      - name: application_date
        tests:
          - not_null

      - name: application_status
        tests:
          - accepted_values:
              values: ['accepted', 'rejected']